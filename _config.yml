# Jekyll Configuration for Portfolio Site

# Site settings
title: Uday Gatti
email: gattiuday@gmail.com
description: Supply Chain Data Analyst with expertise in analytics, forecasting, and optimization
baseurl: "/portfolio"
url: "https://gattiuday.github.io"

# Build settings
markdown: kramdown
theme: minima

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .git/
  - .gitignore

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections (if you want to organize content)
collections:
  projects:
    output: true
    permalink: /projects/:name

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
