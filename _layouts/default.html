<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      /* Apple Music Theme */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background: linear-gradient(180deg, #000000 0%, #1a0a1f 50%, #2d1b3d 100%);
        background-attachment: fixed;
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        color: #f5f5f7;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }
      
      /* Animated gradient background */
      body::before {
        content: '';
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: 
          radial-gradient(circle at 20% 50%, rgba(255, 45, 85, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(191, 90, 242, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 40% 20%, rgba(52, 199, 255, 0.12) 0%, transparent 50%);
        animation: moveGradient 25s ease-in-out infinite;
        z-index: 0;
      }
      
      @keyframes moveGradient {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        33% { transform: translate(5%, -5%) rotate(120deg); }
        66% { transform: translate(-5%, 5%) rotate(240deg); }
      }
      
      /* Top Navigation Bar - Apple Music Style */
      .nav-container {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(29, 29, 31, 0.72);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
      }
      
      nav {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0.8rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }
      
      .nav-brand {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #ff2d55 0%, #bf5af2 50%, #34c7ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 30px rgba(255, 45, 85, 0.3);
      }
      
      .nav-links {
        display: flex;
        gap: 0.3rem;
        flex-wrap: wrap;
        list-style: none;
      }
      
      .nav-links a {
        padding: 0.5rem 1rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(10px);
        border: 0.5px solid rgba(255, 255, 255, 0.06);
        color: #f5f5f7;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }
      
      /* Glass shine effect */
      .nav-links a::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          45deg,
          transparent 30%,
          rgba(255, 255, 255, 0.1) 50%,
          transparent 70%
        );
        transform: translateX(-100%);
        transition: transform 0.6s;
      }
      
      .nav-links a:hover::before {
        transform: translateX(100%);
      }
      
      .nav-links a:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.15);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(255, 45, 85, 0.3);
      }
      
      /* Main Content Container - Apple Music Style */
      .main-content {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 3rem auto;
        padding: 3rem;
        background: rgba(29, 29, 31, 0.5);
        backdrop-filter: saturate(180%) blur(30px);
        -webkit-backdrop-filter: saturate(180%) blur(30px);
        border-radius: 24px;
        border: 0.5px solid rgba(255, 255, 255, 0.08);
        box-shadow: 
          0 8px 32px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        min-height: 60vh;
      }
      
      /* Headings */
      h1, h2, h3, h4, h5, h6 {
        color: #f5f5f7;
        margin-top: 2rem;
        margin-bottom: 1rem;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      
      h1 {
        font-size: 3rem;
        background: linear-gradient(135deg, #ff2d55 0%, #bf5af2 50%, #34c7ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 40px rgba(255, 45, 85, 0.3);
      }
      
      h2 {
        font-size: 2rem;
        color: #34c7ff;
        text-shadow: 0 0 20px rgba(52, 199, 255, 0.3);
      }
      
      h3 {
        font-size: 1.5rem;
        color: #bf5af2;
      }
      
      /* Links */
      a {
        color: #34c7ff;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      
      a:hover {
        color: #bf5af2;
        text-shadow: 0 0 10px rgba(191, 90, 242, 0.5);
      }
      
      /* Cards for homepage - Apple Music Album Style */
      .quick-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin: 2rem 0;
      }
      
      .card {
        background: linear-gradient(135deg, rgba(255, 45, 85, 0.1) 0%, rgba(191, 90, 242, 0.1) 100%);
        backdrop-filter: saturate(180%) blur(20px);
        border-radius: 16px;
        border: 0.5px solid rgba(255, 255, 255, 0.1);
        padding: 2rem;
        text-align: center;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      
      /* Gradient overlay on hover */
      .card::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, rgba(255, 45, 85, 0.2) 0%, rgba(52, 199, 255, 0.2) 100%);
        opacity: 0;
        transition: opacity 0.4s;
        pointer-events: none;
      }
      
      .card:hover::after {
        opacity: 1;
      }
      
      .card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 
          0 20px 60px rgba(255, 45, 85, 0.4),
          0 0 40px rgba(191, 90, 242, 0.3);
        border-color: rgba(255, 45, 85, 0.5);
      }
      
      .card h3 {
        font-size: 1.3rem;
        margin-top: 0.5rem;
        color: #f5f5f7;
        position: relative;
        z-index: 1;
      }
      
      .card-icon {
        font-size: 3.5rem;
        margin-bottom: 0.5rem;
        filter: drop-shadow(0 0 10px rgba(255, 45, 85, 0.5));
        position: relative;
        z-index: 1;
      }
      
      /* Lists */
      ul, ol {
        margin-left: 2rem;
        margin-bottom: 1rem;
        line-height: 1.8;
        color: #d1d1d6;
      }
      
      li {
        margin-bottom: 0.5rem;
      }
      
      li::marker {
        color: #ff2d55;
      }
      
      /* Code blocks */
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 0.3rem 0.6rem;
        border-radius: 8px;
        font-family: 'SF Mono', 'Menlo', monospace;
        font-size: 0.9em;
        color: #34c7ff;
      }
      
      /* Back to Home link */
      .back-link {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.8rem 1.8rem;
        background: linear-gradient(135deg, rgba(255, 45, 85, 0.15) 0%, rgba(191, 90, 242, 0.15) 100%);
        border: 1px solid rgba(255, 45, 85, 0.5);
        border-radius: 12px;
        color: #f5f5f7;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 4px 16px rgba(255, 45, 85, 0.2);
      }
      
      .back-link:hover {
        background: linear-gradient(135deg, rgba(255, 45, 85, 0.3) 0%, rgba(191, 90, 242, 0.3) 100%);
        transform: translateX(-5px);
        box-shadow: 0 8px 24px rgba(255, 45, 85, 0.4);
      }
      
      /* Paragraph styling */
      p {
        line-height: 1.7;
        color: #d1d1d6;
        margin-bottom: 1rem;
      }
      
      /* Responsive */
      @media (max-width: 768px) {
        nav {
          flex-direction: column;
          gap: 1rem;
          text-align: center;
        }
        
        .nav-links {
          justify-content: center;
        }
        
        .main-content {
          padding: 2rem 1.5rem;
          margin: 1.5rem;
        }
        
        h1 {
          font-size: 2.2rem;
        }
        
        h2 {
          font-size: 1.6rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Top Navigation -->
    <div class="nav-container">
      <nav>
        <div class="nav-brand">UDAY GATTI</div>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}">🏡 Home</a></li>
          <li><a href="{{ '/about' | relative_url }}">👨‍💼 About</a></li>
          <li><a href="{{ '/skills' | relative_url }}">⚡ Skills</a></li>
          <li><a href="{{ '/experience' | relative_url }}">💼 Experience</a></li>
          <li><a href="{{ '/projects' | relative_url }}">🚀 Projects</a></li>
          <li><a href="{{ '/education' | relative_url }}">🎓 Education</a></li>
        </ul>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      {{ content }}
    </div>
  </body>
</html>
