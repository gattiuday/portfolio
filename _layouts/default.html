<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <style>
      /* Glassmorphism Dark Theme */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
        background-attachment: fixed;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #e0e0e0;
        min-height: 100vh;
      }
      
      /* Animated background particles */
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(74, 144, 226, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 40% 20%, rgba(138, 43, 226, 0.08) 0%, transparent 50%);
        animation: float 20s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px) translateX(0px); }
        25% { transform: translateY(-20px) translateX(10px); }
        50% { transform: translateY(-10px) translateX(-10px); }
        75% { transform: translateY(-30px) translateX(5px); }
      }
      
      /* Top Navigation Bar - Glass Effect */
      .nav-container {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      
      nav {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }
      
      .nav-brand {
        font-size: 1.5rem;
        font-weight: bold;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 1px;
      }
      
      .nav-links {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        list-style: none;
      }
      
      .nav-links a {
        padding: 0.5rem 1.2rem;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e0e0e0;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      
      .nav-links a::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s ease;
      }
      
      .nav-links a:hover::before {
        left: 100%;
      }
      
      .nav-links a:hover {
        background: rgba(102, 126, 234, 0.2);
        border-color: rgba(102, 126, 234, 0.5);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      
      /* Main Content Container - Glass Effect */
      .main-content {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 2rem auto;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        min-height: 60vh;
      }
      
      /* Headings */
      h1, h2, h3, h4, h5, h6 {
        color: #ffffff;
        margin-top: 1.5rem;
        margin-bottom: 1rem;
      }
      
      h1 {
        font-size: 2.5rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      h2 {
        font-size: 2rem;
        color: #4a90e2;
      }
      
      /* Links */
      a {
        color: #667eea;
        text-decoration: none;
        transition: color 0.3s ease;
      }
      
      a:hover {
        color: #8a9cf7;
      }
      
      /* Cards for homepage */
      .quick-links {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin: 2rem 0;
      }
      
      .card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 2rem;
        text-align: center;
        transition: all 0.4s ease;
        cursor: pointer;
      }
      
      .card:hover {
        background: rgba(102, 126, 234, 0.15);
        border-color: rgba(102, 126, 234, 0.5);
        transform: translateY(-10px);
        box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
      }
      
      .card h3 {
        font-size: 1.3rem;
        margin-top: 0.5rem;
        color: #e0e0e0;
      }
      
      .card-icon {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      
      /* Lists */
      ul, ol {
        margin-left: 2rem;
        margin-bottom: 1rem;
        line-height: 1.8;
      }
      
      li {
        margin-bottom: 0.5rem;
      }
      
      /* Code blocks */
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 0.2rem 0.5rem;
        border-radius: 5px;
        font-family: 'Courier New', monospace;
      }
      
      /* Back to Home link */
      .back-link {
        display: inline-block;
        margin-top: 2rem;
        padding: 0.7rem 1.5rem;
        background: rgba(102, 126, 234, 0.2);
        border: 1px solid rgba(102, 126, 234, 0.5);
        border-radius: 15px;
        color: #e0e0e0;
        transition: all 0.3s ease;
      }
      
      .back-link:hover {
        background: rgba(102, 126, 234, 0.3);
        transform: translateX(-5px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      
      /* Responsive */
      @media (max-width: 768px) {
        nav {
          flex-direction: column;
          gap: 1rem;
          text-align: center;
        }
        
        .nav-links {
          justify-content: center;
        }
        
        .main-content {
          padding: 1.5rem;
          margin: 1rem;
        }
        
        h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Top Navigation -->
    <div class="nav-container">
      <nav>
        <div class="nav-brand">UDAY GATTI</div>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}">🏠 Home</a></li>
          <li><a href="{{ '/about' | relative_url }}">👤 About</a></li>
          <li><a href="{{ '/skills' | relative_url }}">💻 Skills</a></li>
          <li><a href="{{ '/experience' | relative_url }}">💼 Experience</a></li>
          <li><a href="{{ '/projects' | relative_url }}">🚀 Projects</a></li>
          <li><a href="{{ '/education' | relative_url }}">🎓 Education</a></li>
        </ul>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      {{ content }}
    </div>
  </body>
</html>
